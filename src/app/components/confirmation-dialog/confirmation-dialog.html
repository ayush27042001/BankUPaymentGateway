@if (visible) {
  <div class="confirm-dialog-overlay" (click)="onCancel()">
    <div class="confirm-dialog-card" (click)="$event.stopPropagation()">
      <div class="confirm-dialog-header">
        <h3 class="confirm-dialog-title">{{ title }}</h3>
        <button type="button" class="confirm-dialog-close" (click)="onCancel()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="confirm-dialog-body">
        <p class="confirm-dialog-message">{{ message }}</p>
      </div>
      <div class="confirm-dialog-footer">
        <button 
          type="button" 
          class="confirm-dialog-btn {{ cancelButtonClass }}" 
          (click)="onCancel()">
          {{ cancelButtonText }}
        </button>
        <button 
          type="button" 
          class="confirm-dialog-btn {{ confirmButtonClass }} {{ isDestructive ? 'btn-destructive' : '' }}" 
          (click)="onConfirm()">
          {{ confirmButtonText }}
        </button>
      </div>
    </div>
  </div>
}
