<router-outlet></router-outlet>
<app-toast></app-toast>

<button
  type="button"
  class="floating-chat-btn"
  aria-label="Open chat support"
  (click)="toggleChat()">
  <i class="bi bi-chat-dots-fill"></i>
  <span>Chat Support</span>
</button>

<div
  class="chat-overlay"
  *ngIf="isChatOpen"
  (click)="closeChat()">
</div>

<div class="chat-popup" *ngIf="isChatOpen">
  <app-chat-support (closeChat)="closeChat()"></app-chat-support>
</div>
