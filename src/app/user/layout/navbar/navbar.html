<div class="user-navbar">

  <div class="navbar-left">

    <button class="mobile-menu-toggle" (click)="onMenuToggle()" aria-label="Toggle sidebar menu">
      <i class="bi bi-list"></i>
    </button>

   

  </div>

  <div class="navbar-right">

   <div
  class="product-switcher"
  (click)="toggleProductDropdown($event)"
>

 

</div>

    <div class="live-mode" (click)="toggleModeDropdown($event)">
      <div class="status-dot"></div>
      <span>{{ selectedMode }}</span>
      <i class="bi" [ngClass]="isModeDropdownOpen ? 'bi-chevron-up' : 'bi-chevron-down'"></i>
      @if (isModeDropdownOpen) {
        <div class="mode-dropdown">
          <div class="mode-item" (click)="selectMode('Live Mode')">
            <span class="green-dot"></span> Live Mode
          </div>
          <div class="mode-item" (click)="selectMode('Test Mode')">
            <span class="yellow-dot"></span> Test Mode
          </div>
        </div>
      }
    </div>

    <div class="mid-box">
      MID: 12991266
    </div>

    <div class="navbar-icon notification-icon" role="button" tabindex="0">
      <i class="bi bi-bell"></i>
      @if (notifications > 0) {
        <span class="notification-badge">{{ notifications > 99 ? '99+' : notifications }}</span>
      }
    </div>

    <div class="navbar-icon" role="button" tabindex="0">
      <i class="bi bi-broadcast"></i>
    </div>

    <div class="divider"></div>

    <div class="admin-profile-navbar" role="button" tabindex="0" (click)="toggleProfileDropdown($event)">
      <div class="profile-avatar">R</div>
      <div class="profile-details">
        <h4>User </h4>
        <!-- <span>Merchant</span> -->
      </div>
      <i class="bi" [ngClass]="isProfileDropdownOpen ? 'bi-chevron-up' : 'bi-chevron-down'"></i>
      @if (isProfileDropdownOpen) {
        <div class="profile-dropdown">
          <div class="profile-item"><i class="bi bi-person-fill"></i> Profile</div>
          <div class="profile-item"><i class="bi bi-gear-fill"></i> Settings</div>
          <div class="dropdown-divider"></div>
          <div class="logout-item">SIGN OUT</div>
        </div>
      }
    </div>

  </div>

</div>
